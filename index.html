<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxiHub NRW | Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --taxi-yellow: #e1ff00;
            --bg-black: #050505;
            --card-bg: #121212;
            --sidebar-bg: #080808;
            --text-main: #ffffff;
            --text-dim: #888888;
            --border: #222;
            --status-red: #e74c3c;
        }

        .light-mode {
            --bg-black: #f5f5f5;
            --card-bg: #ffffff;
            --sidebar-bg: #eeeeee;
            --text-main: #111111;
            --text-dim: #555555;
            --border: #ddd;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-black); color: var(--text-main); margin: 0; display: flex; height: 100vh; overflow: hidden; transition: 0.3s; }

        /* LOGIN OVERLAY */
        #login-overlay { position: fixed; inset: 0; background: var(--bg-black); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--card-bg); width: 350px; padding: 30px; border-radius: 8px; border: 1px solid var(--taxi-yellow); text-align: center; }
        
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; right: 15px; top: 15px; cursor: pointer; color: var(--text-dim); }
        
        input[type="text"], input[type="password"], textarea, select { 
            background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 4px; width: 100%; box-sizing: border-box; 
        }

        .remember-me { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-dim); margin: 10px 0; cursor: pointer; }

        /* SIDEBAR */
        .sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s; }
        .sidebar.collapsed { width: 70px; }
        .sidebar-header { padding: 20px; color: var(--taxi-yellow); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }

        .nav-section { padding: 10px 0; border-bottom: 1px solid var(--border); }
        .nav-section-title { padding: 5px 20px; font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .nav-item { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 15px; font-size: 14px; color: var(--text-dim); }
        .nav-item:hover, .nav-item.active { color: var(--text-main); background: rgba(225, 255, 0, 0.05); }

        /* MAIN */
        .main-content { flex-grow: 1; overflow-y: auto; padding: 40px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 25px; border-radius: 4px; margin-bottom: 20px; }
        
        .stempeluhr { background: var(--status-red); text-align: center; color: white; border: none; }
        .timer-display { font-size: 40px; font-weight: bold; font-family: monospace; margin: 15px 0; }

        .btn-huge { background: var(--taxi-yellow); color: black; border: none; width: 100%; padding: 40px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 18px; }

        .footer-credits { margin-top: auto; padding: 20px; font-size: 11px; color: white; opacity: 0.7; }
        .contact-box { position: fixed; bottom: 20px; right: 20px; background: var(--card-bg); padding: 15px; border: 1px solid var(--border); font-size: 12px; }
        .contact-box a { color: var(--taxi-yellow); text-decoration: none; font-weight: bold; display: block; margin-top: 5px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2 style="color:var(--taxi-yellow)">TAXI NRW</h2>
            <input type="text" id="l-user" placeholder="Vorname Nachname" style="margin-bottom:15px;">
            <div class="input-group">
                <input type="password" id="l-pass" placeholder="Passwort">
                <i class="fas fa-eye" id="togglePass" onclick="app.viewPass()"></i>
            </div>
            <label class="remember-me">
                <input type="checkbox" id="l-remember"> Gerät merken
            </label>
            <button onclick="app.login()" style="background:var(--taxi-yellow); border:none; padding:15px; width:100%; font-weight:bold; cursor:pointer;">LOGIN</button>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>Taxi Köln</span>
            <i class="fas fa-bars" onclick="app.toggleSidebar()" style="cursor:pointer;"></i>
        </div>

        <div class="nav-section">
            <div class="nav-section-title">Allgemein</div>
            <div class="nav-item active" onclick="app.showPage('dashboard')"><i class="fas fa-home"></i> <span>Dashboard</span></div>
            <div class="nav-item" onclick="app.showPage('profile')"><i class="fas fa-user-edit"></i> <span>Profil</span></div>
        </div>

        <div class="nav-section">
            <div class="nav-section-title">Verwaltung</div>
            <div class="nav-item" onclick="app.showPage('mitglieder')"><i class="fas fa-list"></i> <span>Mitglieder</span></div>
            <div id="admin-nav" class="nav-item hidden" onclick="app.showPage('admin')"><i class="fas fa-lock"></i> <span>Verwaltung</span></div>
        </div>

        <div class="nav-section">
            <div class="nav-section-title">Features</div>
            <div class="nav-item" onclick="app.showPage('patch')"><i class="fas fa-history"></i> <span>Patchnotes</span></div>
            <div class="nav-item" onclick="app.toggleTheme()"><i class="fas fa-adjust"></i> <span>Design</span></div>
        </div>

        <div class="footer-credits">
            <div id="user-info" style="margin-bottom: 10px; font-weight: bold; color: var(--taxi-yellow);"></div>
            Credit C - Taxi Köln<br>
            Created by agrar.julian<br>
            Hosted by Marco Krause
            <button onclick="app.logout()" style="width:100%; margin-top:10px; background:#222; color:red; border:none; padding:5px; cursor:pointer;">Abmelden</button>
        </div>
    </div>

    <div class="main-content">
        <div id="page-dashboard">
            <h1>Willkommen, <span id="welcome-name"></span></h1>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div class="card stempeluhr">
                    <div>Aktuelle Sitzung</div>
                    <div class="timer-display" id="timer">00:00:00</div>
                    <button onclick="app.toggleTimer()" id="t-btn" style="background:white; border:none; padding:10px 25px; border-radius:20px; font-weight:bold; cursor:pointer;">EINSTEMPELN</button>
                </div>
                <div class="card" style="padding:0; border:none;">
                    <button class="btn-huge" onclick="app.showPage('fahrt')">NEUE FAHRT ERFASSEN</button>
                </div>
            </div>
        </div>

        <div id="page-profile" class="hidden">
            <h1>Mein Profil</h1>
            <div class="card" style="max-width:500px;">
                <label>Biografie</label>
                <textarea id="p-bio" style="height:150px; margin-top:10px;"></textarea>
                <button onclick="app.saveProfile()" style="background:var(--taxi-yellow); border:none; padding:15px; width:100%; font-weight:bold; margin-top:10px; cursor:pointer;">SPEICHERN</button>
            </div>
        </div>
    </div>

    <div class="contact-box">
        Discord: <b>agrar.julian</b>
        <a href="https://forms.gle/UxSdaw5BFk8mpRPT6" target="_blank">Fehler Formular</a>
        <a href="https://forms.gle/pk3iQFQZaLvPVu3c6" target="_blank">Website bewerten</a>
    </div>

    <script>
        const app = {
            currentUser: null,
            users: JSON.parse(localStorage.getItem('th_v11_users')) || [{
                name: "Maverick Stone", pass: "Bka26r", rang: "Geschäftsführung", perms: {admin:true}, bio: ""
            }],
            seconds: 0, timer: null,

            init: function() {
                const saved = localStorage.getItem('th_remembered_user');
                if(saved) {
                    this.currentUser = JSON.parse(saved);
                    document.getElementById('login-overlay').classList.add('hidden');
                    this.updateUI();
                }
            },

            login: function() {
                const u = document.getElementById('l-user').value;
                const p = document.getElementById('l-pass').value;
                const rem = document.getElementById('l-remember').checked;
                
                const found = this.users.find(x => x.name === u && x.pass === p);
                if(found) {
                    this.currentUser = found;
                    if(rem) localStorage.setItem('th_remembered_user', JSON.stringify(found));
                    document.getElementById('login-overlay').classList.add('hidden');
                    this.updateUI();
                } else { alert("Daten inkorrekt!"); }
            },

            viewPass: function() {
                const p = document.getElementById('l-pass');
                const i = document.getElementById('togglePass');
                if(p.type === "password") {
                    p.type = "text"; i.classList.replace('fa-eye', 'fa-eye-slash');
                } else {
                    p.type = "password"; i.classList.replace('fa-eye-slash', 'fa-eye');
                }
            },

            updateUI: function() {
                document.getElementById('welcome-name').innerText = this.currentUser.name;
                document.getElementById('user-info').innerText = this.currentUser.name + " | " + this.currentUser.rang;
                document.getElementById('p-bio').value = this.currentUser.bio || "";
                if(this.currentUser.perms.admin) document.getElementById('admin-nav').classList.remove('hidden');
            },

            toggleTimer: function() {
                const btn = document.getElementById('t-btn');
                if(!this.timer) {
                    this.timer = setInterval(() => {
                        this.seconds++;
                        document.getElementById('timer').innerText = new Date(this.seconds * 1000).toISOString().substr(11, 8);
                    }, 1000);
                    btn.innerText = "AUSSTEMPELN"; btn.style.background = "black"; btn.style.color = "white";
                } else {
                    clearInterval(this.timer); this.timer = null;
                    btn.innerText = "EINSTEMPELN"; btn.style.background = "white"; btn.style.color = "black";
                }
            },

            saveProfile: function() {
                this.currentUser.bio = document.getElementById('p-bio').value;
                const idx = this.users.findIndex(u => u.name === this.currentUser.name);
                this.users[idx] = this.currentUser;
                localStorage.setItem('th_v11_users', JSON.stringify(this.users));
                alert("Gespeichert!");
            },

            showPage: function(id) {
                document.querySelectorAll('.main-content > div').forEach(d => d.classList.add('hidden'));
                document.getElementById('page-'+id).classList.remove('hidden');
            },

            toggleSidebar: function() { document.getElementById('sidebar').classList.toggle('collapsed'); },
            toggleTheme: function() { document.body.classList.toggle('light-mode'); },
            logout: function() { localStorage.removeItem('th_remembered_user'); location.reload(); }
        };

        app.init();
    </script>
</body>
</html>
