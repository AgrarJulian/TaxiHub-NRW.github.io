<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Köln Dashboard</title>
<style>
body {margin:0;font-family:Arial;background:#0b0b0b;color:white;}
.sidebar {position:fixed;width:220px;height:100%;background:#111;padding:20px;}
.sidebar h2{color:#ffd700}
.sidebar button{width:100%;margin:8px 0;padding:10px;background:#ffd700;border:none;border-radius:6px;cursor:pointer}
.main {margin-left:240px;padding:20px}
.card{background:#1a1a1a;padding:20px;border-radius:12px;margin-bottom:20px}
.timer{font-size:40px;color:red}
input,select{padding:8px;margin:5px;border-radius:6px;border:none}
button.action{background:#ffd700;color:black;padding:10px;border:none;border-radius:8px}
ul{list-style:none;padding:0}
</style>
</head>
<body>

<div class="sidebar">
<h2>Taxi Köln</h2>
<button onclick="tab('dash')">Dashboard</button>
<button onclick="tab('leit')">Leitstelle</button>
<button onclick="tab('calc')">Rechner</button>
<button onclick="tab('book')">Fahrtenbuch</button>
<button onclick="tab('staff')">Mitarbeiter</button>
<button onclick="tab('logs')">Logs</button>
<button onclick="logout()">Logout</button>
</div>

<div class="main">

<div id="dash" class="card">
<h2>Stempeluhr</h2>
<div class="timer" id="timer">00:00:00</div>
<button class="action" onclick="start()">Einstempeln</button>
<button class="action" onclick="stop()">Ausstempeln</button>
<p>Letzte Sitzung: <span id="last">0</span></p>
<p>Gesamt: <span id="total">0</span></p>

<select id="status">
<option>Einsatzbereit</option>
<option>Im Auftrag</option>
<option>Pause</option>
<option>Zentrale</option>
</select>
</div>

<div id="leit" class="card" style="display:none">
<h2>Leitstelle</h2>
<p>Besetzt von: <span id="leitUser">Niemand</span></p>
<button onclick="claimLeit()">Besetzen</button>
<button onclick="kickLeit()">Freigeben</button>
</div>

<div id="calc" class="card" style="display:none">
<h2>Fahrten Rechner</h2>
<select id="car">
<option value="12000">S-Klasse</option>
<option value="22000">Stretch</option>
<option value="35000">Patriot</option>
</select>
<input id="km" placeholder="KM">
<button onclick="calc()">Berechnen</button>
<p>Preis: <span id="price">0</span> €</p>
</div>

<div id="book" class="card" style="display:none">
<h2>Fahrtenbuch</h2>
<input id="from" placeholder="Start">
<input id="to" placeholder="Ziel">
<input id="dist" placeholder="KM">
<button onclick="addRide()">Speichern</button>
<ul id="rides"></ul>
</div>

<div id="staff" class="card" style="display:none">
<h2>Mitarbeiter</h2>
<ul id="staffList"></ul>
</div>

<div id="logs" class="card" style="display:none">
<h2>Logs</h2>
<ul id="logList"></ul>
</div>

</div>

<script>
let sec=0,interval;
let total=localStorage.getItem('total')||0;

function format(s){let h=Math.floor(s/3600),m=Math.floor((s%3600)/60),se=s%60;return h+":"+m+":"+se}

function start(){interval=setInterval(()=>{sec++;timer.innerText=format(sec)},1000);log("Eingestempelt")}
function stop(){clearInterval(interval);last.innerText=format(sec);total=parseInt(total)+sec;localStorage.setItem('total',total);document.getElementById('total').innerText=format(total);sec=0;log("Ausgestempelt")}

function tab(id){document.querySelectorAll('.card').forEach(x=>x.style.display='none');document.getElementById(id).style.display='block'}

function claimLeit(){leitUser.innerText="Du";log("Leitstelle besetzt")}
function kickLeit(){leitUser.innerText="Niemand";log("Leitstelle freigegeben")}

function calc(){let base=document.getElementById('car').value;let km=document.getElementById('km').value;let price=base*1+km*100;document.getElementById('price').innerText=price}

function addRide(){let r={from:from.value,to:to.value,km:dist.value};let list=JSON.parse(localStorage.getItem('rides')||"[]");list.push(r);localStorage.setItem('rides',JSON.stringify(list));render();log("Fahrt gespeichert")}

function render(){let list=document.getElementById('rides');list.innerHTML="";JSON.parse(localStorage.getItem('rides')||"[]").forEach(r=>{let li=document.createElement('li');li.innerText=r.from+" → "+r.to+" ("+r.km+"KM)";list.appendChild(li)})}

function log(text){let logs=JSON.parse(localStorage.getItem('logs')||"[]");logs.push(text);localStorage.setItem('logs',JSON.stringify(logs));renderLogs()}

function renderLogs(){let l=document.getElementById('logList');if(!l)return;l.innerHTML="";JSON.parse(localStorage.getItem('logs')||"[]").forEach(x=>{let li=document.createElement('li');li.innerText=x;l.appendChild(li)})}

function logout(){localStorage.clear();location.reload()}

window.onload=()=>{document.getElementById('total').innerText=format(total);render();renderLogs()}
</script>

</body>
</html>
