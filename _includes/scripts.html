<script>
// Global app state
let appState = {
  user: null,
  isOnDuty: false,
  currentStatus: 0,
  panicActive: false,
  afkTimeout: null,
  afkWarningTimeout: null
};

// Initialize Lucide icons
lucide.createIcons();

// ============ INTRO SCREEN ============
function startIntro() {
  const introScreen = document.getElementById('intro-screen');
  const introIcon = document.getElementById('intro-icon');
  const introTitle = document.getElementById('intro-title');
  const introSub = document.getElementById('intro-sub');
  const introLoader = document.getElementById('intro-loader');
  const introBar = document.getElementById('intro-bar');
  const introPct = document.getElementById('intro-pct');
  const introMsg = document.getElementById('intro-msg');
  
  let progress = 0;
  const messages = ['System wird geladen...', 'Verbindung wird hergestellt...', 'Dashboard wird initialisiert...', 'Bereit!'];
  let msgIndex = 0;
  
  // Animate icon
  setTimeout(() => {
    introIcon.style.opacity = '1';
    introIcon.style.transform = 'scale(1)';
  }, 300);
  
  // Animate title
  setTimeout(() => {
    introTitle.style.opacity = '1';
    introTitle.style.transform = 'translateY(0)';
  }, 800);
  
  // Animate sub
  setTimeout(() => {
    introSub.style.opacity = '1';
  }, 1300);
  
  // Animate loader
  setTimeout(() => {
    introLoader.style.opacity = '1';
  }, 1600);
  
  // Progress simulation
  const progressInterval = setInterval(() => {
    progress += Math.random() * 30;
    if (progress > 100) progress = 100;
    
    introBar.style.width = progress + '%';
    introPct.textContent = Math.floor(progress) + '%';
    
    if (Math.floor(progress) % 25 === 0 && msgIndex < messages.length) {
      introMsg.textContent = messages[msgIndex++];
    }
    
    if (progress === 100) {
      clearInterval(progressInterval);
      setTimeout(() => {
        introScreen.style.opacity = '0';
        setTimeout(() => {
          introScreen.style.display = 'none';
        }, 1000);
      }, 800);
    }
  }, 300);
}

// ============ MODAL FUNCTIONS ============
function openLoginModal() {
  const modal = document.getElementById('login-modal');
  if (modal) {
    modal.classList.add('open');
  }
}

function closeModal(modalId) {
  const modal = document.getElementById(modalId);
  if (modal) {
    modal.classList.remove('open');
  }
}

function handleLogin() {
  const name = document.getElementById('log-name')?.value || '';
  const pw = document.getElementById('log-pw')?.value || '';
  
  if (!name || !pw) {
    alert('Bitte Name und Passwort eingeben');
    return;
  }
  
  appState.user = { name, pw };
  showApp();
  closeModal('login-modal');
}

function logout() {
  appState.user = null;
  appState.isOnDuty = false;
  document.getElementById('app').style.display = 'none';
  document.getElementById('landing-page').style.display = 'block';
}

// ============ APP FUNCTIONS ============
function showApp() {
  document.getElementById('landing-page').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  updateUserDisplay();
  startLiveUpdates();
}

function updateUserDisplay() {
  if (appState.user) {
    const initials = appState.user.name.split(' ').map(n => n[0]).join('').toUpperCase();
    document.getElementById('user-initials').textContent = initials;
    document.getElementById('user-name').textContent = appState.user.name;
    document.getElementById('user-rank').textContent = 'Fahrer';
  }
}

function switchTab(tabName) {
  // Hide all tabs
  document.querySelectorAll('.tab-view').forEach(tab => {
    tab.classList.remove('active');
  });
  
  // Show selected tab
  const selectedTab = document.getElementById(`view-${tabName}`);
  if (selectedTab) {
    selectedTab.classList.add('active');
  }
  
  // Update nav items
  document.querySelectorAll('.nav-item').forEach(item => {
    item.classList.remove('active');
  });
  const navItem = document.getElementById(`nav-${tabName}`);
  if (navItem) {
    navItem.classList.add('active');
  }
  
  // Update header
  const titles = {
    dashboard: { path: 'Dashboard Alpha', title: 'Dashboard' },
    status: { path: 'Status Board', title: 'Status' },
    dispatch: { path: 'Leitstelle', title: 'Radio Dispatch' }
  };
  
  if (titles[tabName]) {
    document.getElementById('tab-path').textContent = titles[tabName].path;
    document.getElementById('tab-title').textContent = titles[tabName].title;
  }
}

// ============ DUTY & STATUS ============
function toggleDuty() {
  appState.isOnDuty = !appState.isOnDuty;
  const btn = document.getElementById('duty-btn');
  if (btn) {
    btn.textContent = appState.isOnDuty ? 'Dienst beenden' : 'Dienst starten';
    btn.style.background = appState.isOnDuty ? 'var(--green)' : 'var(--y)';
  }
}

function togglePanic() {
  appState.panicActive = !appState.panicActive;
  const btn = document.getElementById('panic-btn');
  const overlay = document.getElementById('panic-overlay');
  const info = document.getElementById('panic-status-info');
  
  if (appState.panicActive) {
    btn.classList.add('panic-active');
    overlay.style.display = 'block';
    if (info) info.style.display = 'block';
  } else {
    btn.classList.remove('panic-active');
    overlay.style.display = 'none';
    if (info) info.style.display = 'none';
  }
}

// ============ AFK DETECTION ============
function setupAFKDetection() {
  function resetAFKTimer() {
    clearTimeout(appState.afkTimeout);
    clearTimeout(appState.afkWarningTimeout);
    
    appState.afkWarningTimeout = setTimeout(() => {
      showAFKWarning();
    }, 20 * 60 * 1000); // 20 minutes
    
    appState.afkTimeout = setTimeout(() => {
      autoLogout();
    }, 23 * 60 * 1000); // 23 minutes
  }
  
  ['mousedown', 'keydown', 'scroll', 'touchstart'].forEach(event => {
    document.addEventListener(event, resetAFKTimer, true);
  });
  
  resetAFKTimer();
}

function showAFKWarning() {
  const afkOverlay = document.getElementById('afk-overlay');
  if (afkOverlay) {
    afkOverlay.style.display = 'flex';
    let countdown = 180; // 3 minutes
    const countdownEl = document.getElementById('afk-timer');
    
    const timer = setInterval(() => {
      countdown--;
      const mins = Math.floor(countdown / 60);
      const secs = countdown % 60;
      if (countdownEl) {
        countdownEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
      }
      
      if (countdown <= 0) {
        clearInterval(timer);
        autoLogout();
      }
    }, 1000);
  }
}

function confirmAFK() {
  const afkOverlay = document.getElementById('afk-overlay');
  if (afkOverlay) {
    afkOverlay.style.display = 'none';
  }
  setupAFKDetection();
}

function autoLogout() {
  logout();
  alert('Sie wurden automatisch abgemeldet.');
}

// ============ LIVE UPDATES ============
function startLiveUpdates() {
  setInterval(() => {
    updateLiveTime();
    updateLiveStats();
  }, 1000);
}

function updateLiveTime() {
  const now = new Date();
  const timeStr = now.toLocaleTimeString('de-DE');
  const dateStr = now.toLocaleDateString('de-DE');
  
  const liveTime = document.getElementById('live-time');
  const liveDate = document.getElementById('live-date');
  
  if (liveTime) liveTime.textContent = timeStr;
  if (liveDate) liveDate.textContent = dateStr;
}

function updateLiveStats() {
  // Simulate live stats
  const cRides = document.getElementById('c-rides');
  const cDrivers = document.getElementById('c-drivers');
  const cSat = document.getElementById('c-sat');
  
  if (cRides) cRides.textContent = Math.floor(Math.random() * 5000) + 1000;
  if (cDrivers) cDrivers.textContent = Math.floor(Math.random() * 50) + 10;
  if (cSat) cSat.textContent = Math.floor(Math.random() * 20) + 80;
}

// ============ UTILITY FUNCTIONS ============
function scrollToSection(sectionId) {
  const section = document.getElementById(sectionId);
  if (section) {
    section.scrollIntoView({ behavior: 'smooth' });
  }
}

function openProfileEdit() {
  alert('Profilbearbeitung - In der vollen Version implementiert');
}

function sendChat() {
  const input = document.getElementById('chat-input');
  if (input && input.value.trim()) {
    console.log('Chat message:', input.value);
    input.value = '';
  }
}

function sendGC() {
  const input = document.getElementById('gc-input');
  if (input && input.value.trim()) {
    console.log('Global chat:', input.value);
    input.value = '';
  }
}

// ============ INITIALIZATION ============
document.addEventListener('DOMContentLoaded', () => {
  startIntro();
  lucide.createIcons();
});

// Scroll animations
const observerOptions = {
  threshold: 0.1,
  rootMargin: '0px 0px -50px 0px'
};

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('fade-up');
      observer.unobserve(entry.target);
    }
  });
}, observerOptions);

document.querySelectorAll('.scroll-text').forEach(el => {
  observer.observe(el);
});
</script>
