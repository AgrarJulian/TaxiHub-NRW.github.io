<!-- LOGIN MODAL -->
<div id="login-modal" class="modal-bg">
  <div class="modal-box" style="max-width:420px">
    <div style="text-align:center;margin-bottom:24px">
      <div style="width:54px;height:54px;background:var(--y);border-radius:14px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center">
        <i data-lucide="shield-check" style="width:26px;height:26px;color:#000"></i>
      </div>
      <h2 class="bebas" style="font-size:28px;letter-spacing:.04em">Mitarbeiter <span style="color:var(--y)">Login</span></h2>
      <p style="font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.15em;margin-top:4px">Dashboard Alpha</p>
    </div>
    <div style="display:flex;flex-direction:column;gap:11px">
      <div><label class="lbl">Name</label><input type="text" id="log-name" placeholder="Vor- und Nachname" class="inp"></div>
      <div><label class="lbl">Passwort</label><input type="password" id="log-pw" placeholder="••••••••" class="inp" onkeydown="if(event.key==='Enter')handleLogin()"></div>
      <button onclick="handleLogin()" class="btn-y" style="width:100%;padding:13px;justify-content:center;font-size:14px;border-radius:11px;margin-top:6px">EINLOGGEN</button>
      <button onclick="closeModal('login-modal')" class="btn-ghost" style="width:100%;padding:10px">Abbrechen</button>
    </div>
    <div style="margin-top:14px;padding:12px;background:rgba(250,204,21,.05);border:1px solid rgba(250,204,21,.15);border-radius:11px">
      <p style="font-size:10px;color:var(--y);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Demo Zugänge</p>
      <p style="font-size:11px;color:var(--muted)" class="mono">Chris Schreiner / Bka26a</p>
      <p style="font-size:11px;color:var(--muted)" class="mono">Marco Krause / Bka26b</p>
      <p style="font-size:11px;color:var(--muted)" class="mono">Maverick Stone / Bka26r</p>
    </div>
  </div>
</div>
