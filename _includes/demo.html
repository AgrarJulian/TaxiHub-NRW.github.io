<!-- Live Demo Section -->
<section style="padding:80px 40px;background:#080c18">
  <div style="max-width:900px;margin:0 auto">
    <div style="font-size:10px;font-weight:700;color:var(--y);text-transform:uppercase;letter-spacing:.2em;text-align:center;margin-bottom:8px">Live Demo</div>
    <h2 class="bebas scroll-text" id="st-demo" style="font-size:clamp(32px,5vw,60px);letter-spacing:.04em;text-align:center;margin-bottom:40px">So sieht das System <span style="color:var(--y)">aus</span></h2>
    <div class="fake-dashboard" id="fake-dash" style="background:rgba(13,18,30,.6);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.06)">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:24px;height:24px;background:var(--y);border-radius:6px;display:flex;align-items:center;justify-content:center"><i data-lucide="radio" style="width:12px;height:12px;color:#000"></i></div>
          <span class="bebas" style="font-size:14px;letter-spacing:.08em">TAXI <span style="color:var(--y)">HQ</span></span>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <div style="display:flex;align-items:center;gap:4px;padding:3px 8px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);border-radius:5px"><div class="pulse-dot" style="width:6px;height:6px"></div><span class="mono" style="font-size:9px;font-weight:700">LIVE</span></div>
          <span class="mono" style="font-size:13px;font-weight:700" id="fake-clock">--:--:--</span>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px">
        <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:12px;border-left:3px solid var(--y)">
          <div style="font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">Fahrten</div>
          <div class="bebas" style="font-size:28px">12</div>
        </div>
        <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:12px">
          <div style="font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">Dienstzeit</div>
          <div class="mono bebas" style="font-size:24px" id="fake-duty">02:14:37</div>
        </div>
        <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:12px">
          <div style="font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">Status</div>
          <span id="fake-status-badge" class="badge b-green" style="margin-top:4px;font-size:9px">Status 1</span>
        </div>
        <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:12px">
          <div style="font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">KM heute</div>
          <div class="bebas" style="font-size:28px">84</div>
        </div>
      </div>
      <div style="background:rgba(250,204,21,.06);border:1px solid rgba(250,204,21,.15);border-radius:10px;padding:12px">
        <div style="font-size:9px;color:var(--y);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">📍 Offener Auftrag</div>
        <div style="font-size:12px;font-weight:700">VIP Kunde — Abholung: Vinewood Blvd 12</div>
      </div>
    </div>
  </div>
</section>
