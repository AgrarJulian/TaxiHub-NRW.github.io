<!-- Hero Section -->
<section class="hero-section" style="padding-top:80px">
  <div class="city-grid"></div>
  <div class="hero-bg-glow" style="width:600px;height:600px;background:radial-gradient(circle,rgba(250,204,21,.07),transparent 70%);top:10%;left:50%;transform:translateX(-50%)"></div>
  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:40px;position:relative;z-index:1">
    <div style="text-align:center;max-width:800px">
      <div class="badge b-yellow" style="margin-bottom:20px;padding:6px 16px;font-size:10px">Taxi Köln — Köln NRW RP</div>
      <h1 class="bebas" style="font-size:clamp(56px,10vw,120px);line-height:.88;letter-spacing:.02em;margin-bottom:20px">Taxi Köln –<br><span style="color:var(--y)">Dein Weg durch Köln</span></h1>
      <p style="color:var(--muted);font-size:16px;max-width:500px;margin:0 auto 36px;line-height:1.7">Professioneller Fahrdienst in Köln. Zuverlässig, schnell, rund um die Uhr.</p>
      <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap">
        <button onclick="scrollToSection('preise')" class="btn-y" style="padding:14px 36px;font-size:15px;border-radius:12px">Fahrt buchen</button>
        <button onclick="openLoginModal()" style="background:rgba(255,255,255,.06);color:#e2e8f0;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 36px;font-size:15px;font-weight:600;cursor:pointer">Zum Dashboard</button>
      </div>
      <!-- LIVE STATUS STRIP -->
      <div style="display:flex;gap:20px;justify-content:center;margin-top:48px;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:8px;padding:10px 20px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:10px">
          <div class="pulse-dot"></div>
          <span style="font-size:12px;font-weight:700;color:#22c55e">Aktuell verfügbar: <span id="live-driver-count">3</span> Fahrer</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;padding:10px 20px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:10px">
          <i data-lucide="radio" style="width:14px;height:14px;color:#60a5fa"></i>
          <span style="font-size:12px;font-weight:700;color:#60a5fa">Leitstelle: <span id="live-leitstelle">Besetzt</span></span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;padding:10px 20px;background:rgba(250,204,21,.08);border:1px solid rgba(250,204,21,.2);border-radius:10px">
          <i data-lucide="clock" style="width:14px;height:14px;color:var(--y)"></i>
          <span style="font-size:12px;font-weight:700;color:var(--y)">Ø Wartezeit: ~<span id="live-wait">5</span> Min</span>
        </div>
      </div>
    </div>
  </div>
  <!-- Scroll hint -->
  <div style="text-align:center;padding-bottom:28px;animation:pulse 2s infinite">
    <i data-lucide="chevrons-down" style="width:24px;height:24px;color:var(--muted);display:block;margin:0 auto"></i>
  </div>
</section>
