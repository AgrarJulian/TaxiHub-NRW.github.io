<!-- Live Statistics Section -->
<section style="padding:80px 40px;background:linear-gradient(180deg,#05070d,#080c18)">
  <div style="max-width:900px;margin:0 auto;text-align:center">
    <div style="font-size:10px;font-weight:700;color:var(--y);text-transform:uppercase;letter-spacing:.2em;margin-bottom:8px">In Zahlen</div>
    <h2 class="bebas scroll-text" id="st-stats" style="font-size:clamp(32px,5vw,60px);letter-spacing:.04em;margin-bottom:48px">Live <span style="color:var(--y)">Statistiken</span></h2>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:24px">
      <div class="scroll-text" id="sc1" style="background:rgba(13,18,30,.8);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:32px;text-align:center">
        <div class="stat-counter" style="color:var(--y);font-size:56px;font-weight:700;line-height:1" id="c-rides">0</div>
        <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:8px">Fahrten gesamt</div>
      </div>
      <div class="scroll-text" id="sc2" style="background:rgba(13,18,30,.8);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:32px;text-align:center">
        <div class="stat-counter" style="color:#22c55e;font-size:56px;font-weight:700;line-height:1" id="c-drivers">0</div>
        <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:8px">Aktive Fahrer</div>
      </div>
      <div class="scroll-text" id="sc3" style="background:rgba(13,18,30,.8);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:32px;text-align:center">
        <div class="stat-counter" style="color:#a855f7;font-size:56px;font-weight:700;line-height:1" id="c-sat">0</div>
        <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:8px">% Zufriedenheit</div>
      </div>
    </div>
  </div>
</section>
