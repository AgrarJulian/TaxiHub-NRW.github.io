<style>
:root{--y:#facc15;--bg:#05070d;--card:rgba(13,18,30,0.92);--border:rgba(255,255,255,0.07);--muted:#64748b;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--orange:#f97316}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
html{scroll-behavior:smooth}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:#e2e8f0}
.bebas{font-family:'Bebas Neue',sans-serif}
.mono{font-family:'JetBrains Mono',monospace}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1e293b;border-radius:10px}
.glass{background:var(--card);backdrop-filter:blur(24px);border:1px solid var(--border)}
.badge{padding:3px 9px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;display:inline-flex;align-items:center;gap:4px}
.b-green{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.25)}
.b-red{background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.25)}
.b-yellow{background:rgba(250,204,21,.12);color:var(--y);border:1px solid rgba(250,204,21,.3)}
.b-blue{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.25)}
.b-purple{background:rgba(168,85,247,.12);color:#a855f7;border:1px solid rgba(168,85,247,.25)}
.b-gray{background:rgba(100,116,139,.1);color:#94a3b8;border:1px solid rgba(100,116,139,.2)}
.b-orange{background:rgba(249,115,22,.12);color:#fb923c;border:1px solid rgba(249,115,22,.25)}
.b-panic{background:rgba(239,68,68,.3);color:#fff;border:1px solid #ef4444;animation:pBadge 1s infinite}
@keyframes pBadge{0%,100%{opacity:1}50%{opacity:.4}}
.nav-item{display:flex;align-items:center;padding:10px 14px;margin:2px 10px;border-radius:10px;color:var(--muted);font-weight:600;font-size:13px;cursor:pointer;transition:all .2s;gap:12px}
.nav-item:hover{color:#e2e8f0;background:rgba(255,255,255,.03)}
.nav-item.active{background:var(--y);color:#000}
.nav-item i{width:15px;height:15px;flex-shrink:0}
@keyframes pulse{0%{transform:scale(.95);box-shadow:0 0 0 0 rgba(34,197,94,.7)}70%{transform:scale(1);box-shadow:0 0 0 8px rgba(34,197,94,0)}100%{transform:scale(.95);box-shadow:0 0 0 0 rgba(34,197,94,0)}}
@keyframes panicPulse{0%{box-shadow:0 0 0 0 rgba(239,68,68,.8)}70%{box-shadow:0 0 0 20px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}
@keyframes panicFlash{0%,100%{opacity:0}50%{opacity:1}}
.pulse-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideRight{from{width:0}to{width:100%}}
.fade-up{animation:fadeUp .35s ease-out forwards}
.tab-view{display:none}.tab-view.active{display:block}#view-generalchat.active{display:flex!important;flex-direction:column}
.modal-bg{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;pointer-events:none}
.modal-bg.open{opacity:1;pointer-events:all}
.modal-box{background:#090d18;border:1px solid rgba(255,255,255,.09);border-radius:22px;width:100%;padding:32px;transform:scale(.96);transition:transform .2s;max-height:92vh;overflow-y:auto}
.modal-bg.open .modal-box{transform:scale(1)}
.inp{width:100%;background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:11px 15px;font-size:13px;color:#e2e8f0;outline:none;font-family:'Space Grotesk',sans-serif}
.inp:focus{border-color:rgba(250,204,21,.5)}
.inp option{background:#0a0e1a}
label.lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);display:block;margin-bottom:5px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px;transition:all .3s}
.kpi:hover{border-color:rgba(250,204,21,.2);transform:translateY(-2px)}
.btn-y{background:var(--y);color:#000;border:none;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.btn-y:hover{transform:scale(1.03)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:10px;font-weight:600;font-size:12px;cursor:pointer;font-family:'Space Grotesk',sans-serif}
.btn-red{background:#ef4444;color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
.data-table{width:100%;border-collapse:collapse}
.data-table th{padding:11px 15px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);border-bottom:1px solid var(--border)}
.data-table td{padding:13px 15px;border-bottom:1px solid rgba(255,255,255,.03);font-size:12px}
.data-table tr:hover td{background:rgba(255,255,255,.015)}
.chat-wrap{overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.chat-msg{padding:9px 13px;border-radius:13px;max-width:84%;background:rgba(255,255,255,.05);font-size:11px;line-height:1.5}
.chat-msg.mine{background:var(--y);color:#000;margin-left:auto}
.chat-name{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px;opacity:.65}
.sys-online{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.sys-warn{background:rgba(250,204,21,.1);color:var(--y);border:1px solid rgba(250,204,21,.2)}
.sys-error{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.staff-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px;cursor:pointer;transition:all .3s;display:flex;flex-direction:column;align-items:center;text-align:center}
.staff-card:hover{border-color:rgba(250,204,21,.3);transform:translateY(-3px)}
.avatar{display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;flex-shrink:0;border-radius:12px}
.cb-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:9px;font-size:12px;font-weight:600}
.cb-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--y);cursor:pointer}
.status-btn{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:12px;border:2px solid transparent;cursor:pointer;transition:all .2s;font-weight:700;font-size:13px;font-family:'Space Grotesk',sans-serif}
.status-btn:hover{transform:translateY(-2px)}
.status-btn.active-status{transform:translateY(-2px)}
.s0{background:rgba(239,68,68,.15);color:#ef4444;border-color:rgba(239,68,68,.3)}.s0.active-status{background:rgba(239,68,68,.3);border-color:#ef4444;box-shadow:0 0 20px rgba(239,68,68,.3)}
.s1{background:rgba(34,197,94,.1);color:#22c55e;border-color:rgba(34,197,94,.25)}.s1.active-status{background:rgba(34,197,94,.25);border-color:#22c55e;box-shadow:0 0 20px rgba(34,197,94,.3)}
.s2{background:rgba(34,197,94,.07);color:#4ade80;border-color:rgba(34,197,94,.15)}.s2.active-status{background:rgba(34,197,94,.2);border-color:#4ade80}
.s3{background:rgba(250,204,21,.1);color:var(--y);border-color:rgba(250,204,21,.25)}.s3.active-status{background:rgba(250,204,21,.25);border-color:var(--y);box-shadow:0 0 20px rgba(250,204,21,.25)}
.s4{background:rgba(168,85,247,.1);color:#a855f7;border-color:rgba(168,85,247,.25)}.s4.active-status{background:rgba(168,85,247,.25);border-color:#a855f7}
.s5{background:rgba(59,130,246,.1);color:#60a5fa;border-color:rgba(59,130,246,.25)}.s5.active-status{background:rgba(59,130,246,.25);border-color:#60a5fa}
.s6{background:rgba(100,116,139,.1);color:#94a3b8;border-color:rgba(100,116,139,.2)}.s6.active-status{background:rgba(100,116,139,.25);border-color:#94a3b8}
.panic-btn{background:linear-gradient(135deg,#dc2626,#991b1b);color:#fff;border:2px solid #ef4444;border-radius:16px;padding:16px 24px;font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.04em;cursor:pointer;transition:all .2s;font-weight:700}
.panic-btn:hover{transform:scale(1.02);box-shadow:0 0 40px rgba(239,68,68,.5)}
.panic-btn.panic-active{animation:panicPulse 1s infinite;background:linear-gradient(135deg,#ef4444,#b91c1c)}
.panic-overlay{position:fixed;inset:0;z-index:99990;background:rgba(239,68,68,.07);pointer-events:none;animation:panicFlash 1s infinite;display:none}
#intro-screen{position:fixed;inset:0;z-index:99999;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1s ease}
@keyframes introGlow{0%,100%{box-shadow:0 0 50px rgba(250,204,21,.6),0 0 100px rgba(250,204,21,.25)}50%{box-shadow:0 0 80px rgba(250,204,21,.9),0 0 160px rgba(250,204,21,.4)}}
@keyframes introPulse{0%,100%{text-shadow:0 0 30px rgba(250,204,21,.9),0 0 80px rgba(250,204,21,.4)}50%{text-shadow:0 0 50px rgba(250,204,21,1),0 0 120px rgba(250,204,21,.6)}}
#app{display:none;height:100vh;flex-direction:row;overflow:hidden}
.cert-paper{background:#fff;color:#1e293b;font-family:'Space Grotesk',sans-serif;padding:52px}
#afk-overlay{position:fixed;inset:0;z-index:99997;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(250,204,21,0)}50%{box-shadow:0 0 16px 2px rgba(250,204,21,.18)}}
.glass:hover{box-shadow:0 4px 24px rgba(0,0,0,.4),0 0 0 1px rgba(250,204,21,.08);transition:box-shadow .25s,border-color .25s}
.btn-y:active{transform:scale(.97)!important}
.kpi:hover{box-shadow:0 0 20px rgba(250,204,21,.1)}
.nav-item{transition:background .18s,color .18s,box-shadow .18s}
.nav-item.active{box-shadow:0 2px 12px rgba(250,204,21,.18)}
.staff-card:hover{box-shadow:0 8px 32px rgba(0,0,0,.5),0 0 0 1px rgba(250,204,21,.15)}
.price-card:hover{box-shadow:0 16px 48px rgba(0,0,0,.5),0 0 20px rgba(250,204,21,.08)}
.data-table tr:hover td{background:rgba(250,204,21,.03);transition:background .15s}
input,select,textarea{transition:border-color .2s,box-shadow .2s}
input:focus,select:focus,textarea:focus{box-shadow:0 0 0 3px rgba(250,204,21,.08)}
.unread-badge{position:absolute;top:-6px;right:-6px;background:#ef4444;color:#fff;border-radius:50%;min-width:18px;height:18px;padding:0 4px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
@media(max-width:768px){
  body{overflow:auto}
  #app{flex-direction:column;height:auto;min-height:100vh}
  aside{width:100%!important;height:auto;flex-direction:row;flex-wrap:wrap;border-right:none!important;border-bottom:1px solid var(--border)}
  aside nav{display:flex;flex-direction:row;flex-wrap:wrap;padding:4px!important;gap:2px;flex:1}
  .nav-item{padding:8px 10px!important;margin:2px 0!important;font-size:11px!important;gap:6px!important;border-radius:8px!important}
  .nav-item span:not(i){display:none}
  aside>div:last-child{width:100%;border-top:1px solid var(--border)}
  #content-area{padding:12px!important}
  .kpi{padding:14px!important}
  .kpi-val,.bebas[style*="font-size:40"]{font-size:28px!important}
  [style*="grid-template-columns:repeat(4"]{grid-template-columns:repeat(2,1fr)!important}
  [style*="grid-template-columns:repeat(3"]{grid-template-columns:repeat(1,1fr)!important}
  [style*="grid-template-columns:1fr 340px"]{grid-template-columns:1fr!important}
  [style*="grid-template-columns:220px 1fr 340px"]{grid-template-columns:1fr!important}
  [style*="grid-template-columns:1fr 300px"]{grid-template-columns:1fr!important}
  [style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr!important}
  .modal-box{padding:20px!important;border-radius:16px!important}
  header{padding:0 14px!important}
  header .bebas[style*="font-size:20"]{font-size:16px!important}
  .hero-section{min-height:auto!important;padding-top:72px!important}
  .hero-section h1{font-size:48px!important}
  [style*="grid-template-columns:repeat(3,1fr)"].price-cards-grid{grid-template-columns:1fr!important}
  nav[style*="padding:14px 48px"]{padding:10px 16px!important}
  .scroll-section{padding:40px 16px!important}
}
@media(max-width:480px){
  .nav-item i{width:18px!important;height:18px!important}
  [style*="font-size:clamp(56px"]{font-size:38px!important}
}
@media print{body>*:not(#print-area){display:none!important}#print-area{display:block!important}}
</style>
