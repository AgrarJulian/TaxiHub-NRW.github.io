<!-- PANIC OVERLAY -->
<div id="panic-overlay" class="panic-overlay"></div>

<!-- AFK OVERLAY -->
<div id="afk-overlay" style="display:none;position:fixed;inset:0;z-index:99997;background:rgba(0,0,0,.88);backdrop-filter:blur(14px);align-items:center;justify-content:center;flex-direction:column">
  <div style="width:80px;height:80px;background:rgba(250,204,21,.1);border:2px solid var(--y);border-radius:50%;display:flex;align-items:center;justify-content:center">
    <i data-lucide="clock" style="width:36px;height:36px;color:var(--y)"></i>
  </div>
  <h2 class="bebas" style="font-size:36px;letter-spacing:.06em;text-align:center">Bist du noch <span style="color:var(--y)">aktiv?</span></h2>
  <p style="color:var(--muted);font-size:14px;text-align:center">Du warst 20 Minuten inaktiv. Bitte bestätige, dass du noch da bist.</p>
  <div id="afk-timer" style="font-family:'JetBrains Mono',monospace;font-size:48px;font-weight:700;color:var(--y)">3:00</div>
  <button onclick="confirmAFK()" style="background:var(--y);color:#000;border:none;border-radius:14px;padding:14px 40px;font-weight:700;font-size:16px;cursor:pointer;font-family:'Space Grotesk',sans-serif;margin-top:20px">BESTÄTIGEN</button>
  <p style="font-size:11px;color:#ef4444;font-weight:600">Kein Klick → Dienst wird automatisch beendet</p>
</div>

<!-- INTRO SCREEN -->
<div id="intro-screen">
  <canvas id="intro-particles" style="position:absolute;inset:0;pointer-events:none;z-index:1"></canvas>
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 55%,rgba(250,204,21,.07) 0%,transparent 65%);pointer-events:none;z-index:2"></div>
  <div id="intro-content" style="position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:0">
    <div id="intro-icon" style="opacity:0;transform:scale(.3);transition:opacity 1s ease,transform 1s cubic-bezier(.34,1.56,.64,1);margin-bottom:22px">
      <div style="width:88px;height:88px;background:var(--y);border-radius:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 50px rgba(250,204,21,.6),0 0 100px rgba(250,204,21,.25)">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.2"><path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v5"/><path d="M14 17H2"/><circle cx="6.5" cy="12" r="2"/></svg>
      </div>
    </div>
    <div id="intro-title" style="opacity:0;transform:translateY(24px);transition:opacity .9s ease,transform .9s ease;text-align:center">
      <div class="bebas" style="font-size:62px;letter-spacing:.1em;line-height:1;color:#fff;text-shadow:0 0 40px rgba(250,204,21,.2)">TAXI <span style="color:var(--y);text-shadow:0 0 30px rgba(250,204,21,.3)">KÖLN</span></div>
      <div id="intro-sub" style="font-size:12px;color:rgba(255,255,255,.45);font-weight:600;text-transform:uppercase;letter-spacing:.28em;margin-top:10px;opacity:0;transition:opacity .7s ease">Dashboard Alpha</div>
    </div>
    <div id="intro-loader" style="opacity:0;transition:opacity .6s ease;margin-top:44px;text-align:center;width:300px">
      <div style="height:2px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;margin-bottom:14px;position:relative">
        <div id="intro-bar" style="height:100%;width:0%;background:linear-gradient(90deg,#b45309,var(--y),#fef08a);box-shadow:0 0 10px var(--y);border-radius:2px;transition:width .15s linear"></div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:0 2px">
        <div id="intro-msg" style="font-size:9px;color:rgba(255,255,255,.3);font-weight:600;text-transform:uppercase;letter-spacing:.14em">System wird geladen...</div>
        <div id="intro-pct" class="mono" style="font-size:11px;color:var(--y);font-weight:700">0%</div>
      </div>
    </div>
  </div>
</div>
